<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Recommender</title>
    <meta name="description" content="Get AI-powered top 5 movie recommendations based on a movie you've watched. Discover your next favorite film.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blob"></div>
    <div class="background-blob secondary"></div>
    
    <main class="container">
        <header class="header">
            <h1>Movie <span class="gradient-text">Recommender</span></h1>
            <p>Enter a movie you love, and we'll find your top 5 next watches.</p>
        </header>

        <section class="search-section">
            <form id="search-form" class="search-form glass-panel" onsubmit="event.preventDefault(); return false;">
                <div class="input-group">
                    <input type="text" id="movie-input" name="title" required placeholder="e.g., The Dark Knight Rises" autocomplete="off">
                    <button type="submit" id="submit-btn" class="glow-on-hover">Recommend</button>
                </div>
            </form>
        </section>

        <section id="loading-state" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing cinematic universes...</p>
        </section>

        <section id="error-state" class="hidden error-msg glass-panel">
        </section>

        <section id="results-section" class="hidden">
            <h2 class="results-title">Top 5 Matches For You</h2>
            <div id="movie-grid" class="movie-grid">
                <!-- Movie cards will be populated here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
